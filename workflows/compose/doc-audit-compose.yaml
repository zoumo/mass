kind: workspace-compose
metadata:
  name: WORKSPACE_NAME
spec:
  source:
    type: local
    path: ./
  runs:
    - name: worker
      agent: claude
      systemPrompt: |
        You are a technical auditor and fix planner. 
        Never guess — run commands and read actual code to verify findings.
        Always write output files to the directory specified in your task. 
        When given review-feedback.md, address every gap before resubmitting.

    - name: reviewer
      agent: claude
      systemPrompt: |
        You are a senior engineer reviewing audit reports and fix plans. 
        Be decisive: success means ready to apply, failed means specific actionable gaps.
        Always write output files to the directory specified in your task.
