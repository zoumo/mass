name: doc-audit
description: "Audit docs for outdated content and produce a fix plan."
compose: workflows/compose/doc-audit-compose.yaml

cleanup:
  preserve_workspace: false  # set true to keep workspace + artifacts for debugging

stages:
  - name: audit_plan
    agent: worker
    description: |
      Audit docs per task prompt.

      1. Scope: find relevant doc files + source-of-truth files/commands. Record scope at top.
      2. Audit: per discrepancy — file path + line range, exact doc quote, actual source-of-truth value, severity: CRITICAL (causes errors / misleading) | MINOR (stale/drift).
      3. fix-plan.md: per finding — Fix ID (FIX-001…), file, severity, effort (trivial/small/medium), Old (exact), New (exact), Reason (1 line).

      Order CRITICAL first. Note cross-file deps. End with summary table: file | critical | minor | effort.
      Write audit-report.md and fix-plan.md to task output dir.
    max_retries: 3
    routes:
      - when: success
        goto: review
      - when: failed
        goto: __escalate__
      - when: needs_human
        goto: __escalate__

  - name: review
    agent: reviewer
    description: |
      Review audit-report.md and fix-plan.md.

      Check: scope justified? findings specific (file/line/exact text)? false positives? source-of-truth verified (not guessed)? fix-plan covers all findings? Old/New verbatim for CRITICAL?

      Approved: write final-fix-plan.md (fix-plan.md + approval note) to task output dir. Mark success.
      Rejected: write review-feedback.md with specific gaps. Mark failed.
    input_from: [audit_plan]
    max_retries: 3
    routes:
      - when: success
        goto: __done__
      - when: failed
        goto: audit_plan
      - when: needs_human
        goto: __escalate__

output:
  summary: true
