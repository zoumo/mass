name: doc-audit
description: "Audit docs for outdated content and produce a fix plan."
compose: workflows/compose/doc-audit-compose.yaml

cleanup:
  preserve_workspace: false  # set true to keep workspace + artifacts for debugging

stages:
  - name: audit_plan
    agent: worker
    description: |
      You will receive a task prompt describing what to audit.

      Step 1 — Determine scope: explore the codebase to identify which doc files and
      source-of-truth files/commands are relevant. Record the scope at the top of your report.

      Step 2 — Perform the audit. For each discrepancy found, record:
        - File path + line range
        - Exact quote from doc (what it says)
        - What the source of truth actually says
        - Severity: CRITICAL (will cause errors / actively misleading) / MINOR (stale, description drift)

      Step 3 — Write fix-plan.md. For each finding:
        - Fix ID (FIX-001, FIX-002, ...)
        - File path
        - Severity: CRITICAL | MINOR
        - Effort: trivial (1-2 lines) | small (< 10 lines) | medium (section rewrite)
        - Old: exact quoted content to replace
        - New: exact replacement
        - Reason: one line

      Order: CRITICAL first, then MINOR. Note cross-file dependencies.
      End with a summary table: file | critical | minor | effort total.

      Write audit-report.md and fix-plan.md to your task output directory.
    max_retries: 3
    routes:
      - when: success
        goto: review
      - when: failed
        goto: __escalate__
      - when: needs_human
        goto: __escalate__

  - name: review
    agent: reviewer
    description: |
      Review audit-report.md and fix-plan.md for completeness and accuracy.

      Check:
        - Did the worker record and justify the scope they chose?
        - Are findings specific enough (file, line, exact text)?
        - Any false positives (doc and source of truth actually agree)?
        - Did the worker use the real source of truth (run commands / read code), not guess?
        - Does fix-plan.md cover all findings? Are Old/New values verbatim for CRITICAL fixes?

      If approved: write final-fix-plan.md (copy of fix-plan.md with your approval note) to
      your task output directory. Mark success.

      If rejected: write review-feedback.md listing specific gaps. Mark failed.
    input_from: [audit_plan]
    max_retries: 3
    routes:
      - when: success
        goto: __done__
      - when: failed
        goto: audit_plan
      - when: needs_human
        goto: __escalate__

output:
  summary: true
