name: coding
description: "Standard development pipeline: plan → review → execute → code review → fix"

compose: skills/mass-pipeline/templates/coding-compose.yaml

stages:
  - name: plan
    agent: planner
    description: "Analyze the requirements and write a detailed implementation plan to plan.md"
    max_retries: 3
    routes:
      - when: success
        goto: plan_review
      - when: failed
        goto: __escalate__
      - when: needs_human
        goto: __escalate__

  - name: plan_review
    agent: reviewer
    description: "Review plan.md for completeness, correctness, and feasibility. Give specific feedback if changes needed."
    input_from: [plan]
    max_retries: 3
    routes:
      - when: success
        goto: execute
      - when: failed
        goto: plan
      - when: needs_human
        goto: __escalate__

  - name: execute
    agent: worker
    description: "Implement the plan from plan.md. Write tests. Produce working code."
    input_from: [plan, plan_review]
    max_retries: 3
    routes:
      - when: success
        goto: code_review
      - when: failed
        goto: plan
      - when: needs_human
        goto: __escalate__

  - name: code_review
    agent: reviewer
    description: "Review the implemented code for correctness, quality, and test coverage. Give file:line specific feedback if changes needed."
    input_from: [plan, execute]
    max_retries: 3
    routes:
      - when: success
        goto: __done__
      - when: failed
        goto: execute
      - when: needs_human
        goto: __escalate__

output:
  collect_from: [execute]
  destination: ./pipeline-output/
  summary: true
